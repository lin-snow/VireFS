version: "2"

run:
  go: "1.25"
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errorlint
    - gocritic
    - misspell
    - unconvert
    - prealloc
    - revive
    - nolintlint
    - bodyclose
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: blank-imports
        - name: exported
        - name: error-return
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
    nolintlint:
      require-explanation: true
      require-specific: true
  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: '(.+)_test\.go'
        linters:
          - gocritic
          - revive
          - prealloc

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lin-snow/VireFS

output:
  formats:
    text:
      path: stdout
      colors: true
  sort-order:
    - linter
    - file

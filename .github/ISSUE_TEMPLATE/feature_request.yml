name: 功能建议
description: 提出一个新功能或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述清楚使用场景，这有助于我们评估优先级。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 使用场景
      description: 你遇到了什么问题，或者希望在什么场景下使用这个功能？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你期望的解决方案是什么？如果可能，附上 API 草案或伪代码
      render: go
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 核心 FS 接口
        - LocalFS
        - ObjectFS
        - MountTable / Schema
        - 插件 (plugin/)
        - 文档 / 示例
        - 其他
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何有助于理解需求的附加上下文
    validations:
      required: false

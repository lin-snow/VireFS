name: Bug 报告
description: 报告一个 Bug 帮助我们改进
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 Bug 报告！请尽量填写以下信息，这有助于我们快速定位和修复问题。

  - type: input
    id: go-version
    attributes:
      label: Go 版本
      description: 运行 `go version` 获取
      placeholder: "go1.25.0 darwin/arm64"
    validations:
      required: true

  - type: input
    id: virefs-version
    attributes:
      label: VireFS 版本
      description: go.mod 中的版本或 commit hash
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: 涉及的存储后端
      options:
        - LocalFS
        - ObjectFS (S3/MinIO/R2)
        - MountTable
        - 其他/不确定
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述问题
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 提供最小可复现代码或步骤
      render: go
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么（如有错误信息请附上）
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何有助于定位问题的附加上下文
    validations:
      required: false
